  .page {
    position: relative; z-index: 1;
    max-width: 620px; margin: 0 auto;
    padding: 0 20px 60px;
  }

  /* ── Header ── */
  header { text-align: center; padding: 36px 20px 12px; }

  .wedding-date {
    font-size: 11px; font-weight: 400;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: #2a2010;
    margin-bottom: 14px;
  }
  .divider-line {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin: 12px 0;
  }
  .divider-line::before, .divider-line::after {
    content: ''; flex: 1; max-width: 80px;
    height: 1px; background: #2a2010; opacity: 0.3;
  }
  .divider-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: #2a2010; opacity: 0.35;
  }
  .couple-names {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(40px, 11vw, 58px);
    font-weight: 300; color: #2a2010;
    line-height: 1.05; letter-spacing: 0.03em;
  }
  .couple-names em { font-style: italic; color: #4a5c42; }
  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 17px;
    color: #2a2010; margin-top: 8px;
  }

  /* ── Search ── */
  .search-section { margin: 12px 0 16px; }
  .search-wrap { position: relative; }
  .search-icon {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%); pointer-events: none;
  }
  input[type="text"] {
    width: 100%; padding: 13px 14px 13px 42px;
    font-family: 'Jost', sans-serif; font-size: 15px; font-weight: 400;
    color: #2a2010 !important; background: #ffffff !important;
    border: 2px solid #2a2010; border-radius: 3px;
    outline: none; -webkit-appearance: none; appearance: none;
  }
  input[type="text"]::placeholder { color: #9a9080; font-weight: 300; }
  input[type="text"]:focus { border-color: #4a5c42; }
  .search-hint {
    text-align: center; font-size: 11px;
    letter-spacing: 0.16em; color: #2a2010;
    margin-top: 8px; text-transform: uppercase; font-weight: 400;
  }

  /* ── Result card ── */
  .result-card {
    background: #ffffff;
    border: 2px solid #2a2010;
    border-radius: 3px; padding: 24px 20px 20px;
    margin-bottom: 10px; text-align: center;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 400; color: #2a2010;
  }
  .result-table-label {
    font-size: 10px; letter-spacing: 0.26em; font-weight: 400;
    text-transform: uppercase; color: #4a5c42; margin-top: 12px;
  }
  .result-table-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 64px; font-weight: 300; color: #2a2010;
    line-height: 1;
  }
  .result-tbd {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 16px;
    color: #6a6050; margin-top: 8px;
  }

  /* ── Toggle ── */
  .view-toggle {
    display: flex;
    border: 2px solid #2a2010;
    border-radius: 3px; overflow: hidden;
    margin: 20px 0 18px;
  }
  .toggle-btn {
    flex: 1; padding: 11px; background: #ffffff; border: none;
    font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 400;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: #2a2010; cursor: pointer; transition: background 0.2s, color 0.2s;
  }
  .toggle-btn + .toggle-btn { border-left: 1.5px solid #2a2010; }
  .toggle-btn.active { background: #f7e06e; color: #3a2c08; }

  /* ── Alpha list ── */
  .alpha-section { margin-bottom: 0; }

  .alpha-letter-heading {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; font-weight: 400;
    color: #4a5c42; letter-spacing: 0.24em;
    text-transform: uppercase;
    padding: 14px 0 5px;
    border-bottom: 1.5px solid #4a5c42;
  }

  .guest-item {
    display: flex; align-items: flex-end;
    padding: 9px 12px;
    background: #ffffff;
    border-left: 2px solid #2a2010;
    border-right: 2px solid #2a2010;
    border-bottom: 1px solid #e0d8be;
  }
  .alpha-section .guest-item:first-of-type {
    border-top: 1px solid #e0d8be;
  }
  .guest-item.highlight {
    background: #f5f8f2;
    border-left-color: #4a5c42;
    border-right-color: #4a5c42;
  }

  .g-name {
    font-size: 17px; color: #2a2010; font-weight: 400;
    letter-spacing: 0.01em; line-height: 1;
    white-space: nowrap; flex-shrink: 0;
    padding-bottom: 1px;
  }
  .g-name strong { font-weight: 400; }

  .g-dots {
    flex: 1; min-width: 12px;
    height: 1px; margin: 0 8px 4px;
    background-image: radial-gradient(circle, #2a2010 1px, transparent 1px);
    background-size: 6px 1px;
    background-repeat: repeat-x;
    opacity: 0.2;
    align-self: flex-end;
  }

  .g-table {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px; font-weight: 400; color: #2a2010;
    flex-shrink: 0; line-height: 1;
  }
  .g-tbd {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 13px; color: #8a8070; flex-shrink: 0;
  }

  /* ── Table cards ── */
  .tables-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
    gap: 12px;
  }
  .table-card {
    background: #ffffff;
    border: 2px solid #2a2010;
    border-radius: 3px;
    padding: 14px 16px;
  }
  .table-letter {

    font-size: 28px; font-weight: 300; color: #2a2010;
    line-height: 1; margin-bottom: 10px;
    padding-bottom: 8px; border-bottom: 1.5px solid #4a5c42;

  .table-guest-name {

    padding: 4px 0; border-bottom: 1px solid #ede8d0; line-height: 1.3;
  }
  .table-guest-name:last-child { border-bottom: none; }

  .no-results {
    text-align: center; padding: 28px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 18px; color: #6a6050;
  }

  /* ── Tables section header ── */
  .section-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 19px; color: #2a2010; white-space: nowrap;
  }
  .section-line { flex: 1; height: 1px; background: #2a2010; opacity: 0.2; }

  /* ── Footer ── */
  footer { text-align: center; padding: 44px 20px 16px; }
  .footer-divider {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-bottom: 12px;

  .footer-divider::before, .footer-divider::after {
    content: ''; height: 1px; width: 48px;
    background: #2a2010; opacity: 0.25;
  }
  .footer-rose {
    width: 20px; height: 20px; opacity: 0.25;
  }
  .footer-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 16px; color: #2a2010;
  }
</style>

<script>
const guestsByTable = {
  A:[{first:"Julie",last:"Ellard"},{first:"Tom",last:"Santamaria"},{first:"Frank",last:"Bellomo"},{first:"Meg",last:"Bellomo"},{first:"Jody",last:"Marcoux"},{first:"Paul",last:"Marcoux"},{first:"Lori",last:"Fonseca"},{first:"Diane",last:"Chaplin"},{first:"Steven",last:"Ellard"},{first:"Christine",last:"Ellard"}],
  B:[{first:"Sara",last:"Elkerm"},{first:"Kerry",last:"Ellard"},{first:"Danielle",last:"Rico"},{first:"Chris",last:"Taylor"},{first:"Chrissy",last:"Conti"},{first:"Colby",last:"Butler"},{first:"Karen",last:"Costello"},{first:"Shannon",last:"Butler"},{first:"Roger",last:"Noll"}],
  C:[{first:"Troy",last:"Bigwood"},{first:"Julia",last:"Bigwood"},{first:"Ryan",last:"Stelling"},{first:"Brittany",last:"Stelling"},{first:"Ari",last:"Stelling"},{first:"Ella",last:"Stelling"},{first:"Ashraf",last:"Elkerm"},{first:"Eyman",last:"Elkerm"},{first:"Barbara",last:"Wyman"},{first:"Debra",last:"Bishop"}],
  D:[{first:"Pej",last:"Ayandeh"},{first:"Jessica",last:"Wolk"},{first:"Hale",last:"Haile"},{first:"Haley",last:"Sullivan"},{first:"Magno",last:"Gil"},{first:"Tim",last:"Gil"},{first:"Nicole",last:"Perez"},{first:"Derek",last:"Pereira"},{first:"Debbie",last:"Kozlowski"},{first:"Stephanie",last:"Grammel"}],
  E:[{first:"Patty",last:"Federico"},{first:"Anthony",last:"Federico"},{first:"Linda",last:"Ludvigsen"},{first:"Ron",last:"Ludvingsen"},{first:"Rick",last:"Conti"},{first:"Anita",last:"Conti"},{first:"Michelle",last:"Conti"},{first:"Callum",last:""},{first:"Jesse",last:"Wilfert"},{first:"Frances",last:"Sinclair"}],
  F:[{first:"Ryan",last:"Semple"},{first:"Emily",last:"Semple"},{first:"Ryan",last:"Rogers"},{first:"Jenny",last:"Kohl"},{first:"Stephen",last:"Moreno"},{first:"Lissbeth",last:"Martinez"},{first:"Adrian",last:"Vogt"},{first:"John",last:"Munroe"},{first:"Emma",last:"George"},{first:"Ariel",last:"Reches"}],
  G:[{first:"Ben",last:"Carroll"},{first:"Zoey",last:"Sloate"},{first:"Phillip",last:"Harrison"},{first:"Kat",last:"Reidl"},{first:"Paul",last:"LaGrandeur"},{first:"Carly",last:"Nangle LaGrandeur"},{first:"Ryan",last:"Jerue"},{first:"Taylor",last:"Jerue"},{first:"Matt",last:"Leppek"},{first:"Melissa",last:"Leppek"}],
  H:[{first:"Maria",last:"Elena"},{first:"Alberto",last:"Vogt"},{first:"Ricardo",last:"Beras Prats"},{first:"Laura",last:"Vogt"},{first:"Tamara",last:"Beras Puesan"},{first:"Raysa",last:"Beras Puesan"},{first:"Antonio",last:"Puesan"},{first:"Nidia",last:"Ramirez"},{first:"Alejandra",last:"Leon"},{first:"Erwin",last:"Vogt"}],
  I:[{first:"Jose",last:"Alvares"},{first:"Marisol",last:"Alvares"},{first:"Gianna",last:"Alvares"},{first:"Emerson",last:"Alvares"},{first:"Maria",last:"de Lourdes Gonzalez"},{first:"Joaco",last:"Omar"},{first:"Alexandra",last:"Nazario"},{first:"Maria Luisa",last:"Cedeno"},{first:"Francisco",last:"Ramos"},{first:"Anabelle",last:"Vogt"}],
  J:[{first:"Gabriel",last:"Nazario"},{first:"Alejandra",last:"Casallas"},{first:"Xavier",last:"Nazario"},{first:"Vanessa",last:"Rodriguez Lopez"},{first:"Erwin",last:"Vogt"},{first:"Andrea",last:"Cabrera"},{first:"Alvaro",last:"Ramos"},{first:"Natalie",last:"Vogt"},{first:"Christian",last:"Rivera"},{first:"Mauricio",last:"Vogt"}],
  K:[{first:"Manuel",last:"Andreu"},{first:"Estela",last:"Andreu"},{first:"Camila",last:"Andreu"},{first:"Chiara",last:"Vogt"}],
};
const tableOrder=['A','B','C','D','E','F','G','H','I','J','K'];
const allGuests=[];
tableOrder.forEach(t=>guestsByTable[t].forEach(g=>allGuests.push({...g,table:t})));
const sorted=[...allGuests].sort((a,b)=>{
  const la=(a.last||a.first).toLowerCase(),lb=(b.last||b.first).toLowerCase();
  return la.localeCompare(lb)||a.first.toLowerCase().localeCompare(b.first.toLowerCase());
});
function setView(v){
  document.getElementById('btn-alpha').classList.toggle('active',v==='alpha');
  document.getElementById('btn-table').classList.toggle('active',v==='table');
  document.getElementById('alpha-view').style.display=v==='alpha'?'':'none';
  document.getElementById('table-view').style.display=v==='table'?'':'none';
}
function renderAlpha(list,hl){
  const el=document.getElementById('guest-list');
  if(!list.length){el.innerHTML='<div class="no-results">No guests found</div>';return;}
  const groups={};
  list.forEach(g=>{const k=(g.last||g.first)[0].toUpperCase();if(!groups[k])groups[k]=[];groups[k].push(g);});
  el.innerHTML=Object.keys(groups).sort().map(letter=>{
    const rows=groups[letter].map(g=>{
      const isHL=hl&&hl.has(g.first+'|'+g.last+'|'+g.table);
      return `<div class="guest-item${isHL?' highlight':''}"><span class="g-name"><strong>${g.last||g.first}</strong>${g.last?', '+g.first:''}</span><span class="g-dots"></span>${g.table?`<span class="g-table">${g.table}</span>`:'<span class="g-tbd">TBD</span>'}</div>`;
    }).join('');
    return `<div class="alpha-section"><div class="alpha-letter-heading">${letter}</div>${rows}</div>`;
  }).join('');
}
function renderTables(){
  document.getElementById('tables-grid').innerHTML=tableOrder.filter(t=>guestsByTable[t].length).map(t=>`
    <div class="table-card"><div class="table-letter">Table ${t}</div>${guestsByTable[t].map(g=>`<div class="table-guest-name">${g.first} ${g.last}</div>`).join('')}</div>`).join('');
}
function onSearch(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const re=document.getElementById('search-results');
  if(!q){re.innerHTML='';renderAlpha(sorted,null);return;}
  const m=allGuests.filter(g=>g.first.toLowerCase().includes(q)||g.last.toLowerCase().includes(q));
  re.innerHTML=m.length?m.map(g=>`<div class="result-card"><div class="result-name">${g.first} ${g.last}</div>${g.table?`<div class="result-table-label">Your table</div><div class="result-table-name">${g.table}</div>`:'<div class="result-tbd">Table assignment coming soon</div>'}</div>`).join(''):'<div class="no-results">No guest found — try a different spelling</div>';
  renderAlpha(sorted,new Set(m.map(g=>g.first+'|'+g.last+'|'+g.table)));
}
renderAlpha(sorted,null);
renderTables();
</script>
